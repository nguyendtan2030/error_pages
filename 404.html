<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found - MeozLabs</title>
    <link rel="icon" href="meoz-lab-icon.jpg" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #1a1625; --bg-accent: #2b273f; --primary: #2dd4bf; --secondary: #8b5cf6; --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { margin: 0; padding: 0; font-family: "Inter", sans-serif; background-color: #0d0b13; color: var(--text-main); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        /* Background Image with Parallax & Blur Effect */
        .bg-image { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: url('meoz-lab2.jpg') center/cover no-repeat; opacity: 0.12; filter: blur(10px); z-index: 0; transform: scale(1.05); animation: bg-breathe 30s infinite alternate ease-in-out; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, rgba(26, 22, 37, 0.3) 0%, var(--bg-dark) 100%); z-index: 0; pointer-events: none; }
        @keyframes bg-breathe { 0% { transform: scale(1.05); } 100% { transform: scale(1.15); } }

        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: float 10s infinite alternate ease-in-out; z-index: 1; pointer-events: none; }
        .orb-1 { width: 300px; height: 300px; background: rgba(45, 212, 191, 0.2); top: -50px; left: -50px; }
        .orb-2 { width: 400px; height: 400px; background: rgba(139, 92, 246, 0.15); bottom: -100px; right: -100px; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        .container { position: relative; z-index: 2; background: rgba(34, 31, 48, 0.6); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; padding: 50px 40px; max-width: 480px; width: 85%; text-align: center; box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7); animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(40px); }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* Modern Orbiting Radar Animation */
        .radar-wrapper { position: relative; width: 210px; height: 210px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; }
        .radar-circle { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 2px dashed rgba(45, 212, 191, 0.3); animation: spin-slow 15s linear infinite; }
        .radar-circle::before { content: ''; position: absolute; top: -5px; left: 50%; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 15px var(--primary); }
        .radar-sweep { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, transparent 70%, rgba(45, 212, 191, 0.15) 100%); animation: radar-spin 3s linear infinite; }
        .radar-dot { position: absolute; width: 8px; height: 8px; background: var(--secondary); border-radius: 50%; top: 15%; left: 82%; box-shadow: 0 0 15px 3px var(--secondary); animation: radar-ping 2.5s infinite; opacity: 0; }
        
        .radar-bg-img { position: relative; width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(139, 92, 246, 0.5); box-shadow: 0 0 25px rgba(139, 92, 246, 0.3); z-index: 2; animation: float-img 4s ease-in-out infinite alternate; }
        
        @keyframes radar-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-slow { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes radar-ping { 0% { opacity: 0; transform: scale(0.5); } 20% { opacity: 1; transform: scale(1.5); } 50% { opacity: 0; transform: scale(1); } 100% { opacity: 0; } }
        @keyframes float-img { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }

        .error-code { font-size: 75px; font-weight: 800; color: transparent; margin: 0 0 10px; background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
        h1 { font-size: 24px; font-weight: 700; margin: 0 0 15px; color: #fff; letter-spacing: -0.5px; }
        p { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin: 0 0 35px; font-weight: 300; }
        
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 14px 30px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: #fff; text-decoration: none; border-radius: 16px; font-weight: 600; font-size: 15px; box-shadow: 0 8px 20px rgba(45, 212, 191, 0.3); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(45, 212, 191, 0.5); }

        .status-badge { display: inline-flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.05); padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; color: var(--secondary); border: 1px solid rgba(139, 92, 246, 0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .dot { width: 8px; height: 8px; background-color: var(--secondary); border-radius: 50%; box-shadow: 0 0 10px var(--secondary); animation: blink 1.5s infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .branding { position: absolute; bottom: 40px; z-index: 2; display: flex; align-items: center; gap: 8px; opacity: 0; animation: fadeIn 1s ease forwards 0.5s; }
        @keyframes fadeIn { to { opacity: 1; } }
        .branding-text { color: var(--text-muted); font-size: 13px; font-weight: 400; }
        .branding-logo { background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 15px; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="radar-wrapper">
            <div class="radar-circle"></div>
            <div class="radar-sweep"></div>
            <div class="radar-dot"></div>
            <img src="meoz-lab-radar.jpg" alt="Target Background" class="radar-bg-img">
        </div>
        <div class="error-code">404</div>
        <h1>Target Not Found</h1>
        <p>The page you are looking for has been moved or doesn't exist within the <strong>MeozLabs Infrastructure</strong>.</p>
        <div class="status-badge">
            <span class="dot"></span>
            Target unreachable
        </div>
    </div>

    <div class="branding">
        <span class="branding-text">Running on</span>
        <span class="branding-logo">MeozLabs Server</span>
    </div>
</body>
</html>
