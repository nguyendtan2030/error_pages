<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meoz Labs - Innovation & Technology</title>
    <link rel="icon" href="meoz-lab-icon.jpg" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #1a1625; --bg-accent: #2b273f; --primary: #2dd4bf; --secondary: #8b5cf6; --text-main: #f8fafc; --text-muted: #94a3b8; }
        
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #0d0b13; color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; position: relative; }
        
        /* Background Image with Parallax & Blur Effect */
        .bg-image { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: url('meoz-lab2.jpg') center/cover no-repeat; opacity: 0.12; filter: blur(10px); z-index: 0; transform: scale(1.05); animation: bg-breathe 30s infinite alternate ease-in-out; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, rgba(26, 22, 37, 0.3) 0%, var(--bg-dark) 100%); z-index: 0; pointer-events: none; }
        @keyframes bg-breathe { 0% { transform: scale(1.05); } 100% { transform: scale(1.15); } }

        .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.5; animation: float 15s infinite alternate ease-in-out; z-index: 1; pointer-events: none; }
        .orb-1 { width: 350px; height: 350px; background: rgba(45, 212, 191, 0.2); top: 5%; left: 0%; }
        .orb-2 { width: 450px; height: 450px; background: rgba(139, 92, 246, 0.2); bottom: 0%; right: 0%; animation-delay: -7s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, -50px) scale(1.1); } }

        /* Split Layout Container */
        .container { position: relative; z-index: 2; background: rgba(22, 19, 32, 0.65); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; padding: 60px 70px; max-width: 950px; width: 85%; display: flex; flex-direction: row; align-items: center; gap: 60px; box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255,255,255,0.02); animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(40px); }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .visual-section { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .content-section { flex: 1.2; text-align: left; }

        /* Profile Image Animation */
        .profile-wrapper { position: relative; width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; }
        .profile-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 2px dashed rgba(45, 212, 191, 0.4); animation: spin 25s linear infinite; }
        .profile-ring-2 { position: absolute; top: -15px; left: -15px; width: calc(100% + 30px); height: calc(100% + 30px); border-radius: 50%; border: 3px solid transparent; border-top-color: rgba(139, 92, 246, 0.6); border-bottom-color: rgba(139, 92, 246, 0.6); animation: spin-reverse 15s linear infinite; }
        .profile-ring-3 { position: absolute; top: -30px; left: -30px; width: calc(100% + 60px); height: calc(100% + 60px); border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: inset 0 0 30px rgba(45, 212, 191, 0.1); animation: pulse-ring 4s infinite alternate; }
        
        .profile-img { width: 280px; height: 280px; border-radius: 24px; object-fit: cover; border: 4px solid rgba(255, 255, 255, 0.15); box-shadow: 0 0 50px rgba(45, 212, 191, 0.25); z-index: 10; animation: gentle-pulse 4s ease-in-out infinite alternate; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse-ring { 0% { transform: scale(0.95); opacity: 0.5; } 100% { transform: scale(1.02); opacity: 1; } }
        @keyframes gentle-pulse { 0% { transform: scale(1); box-shadow: 0 0 30px rgba(45, 212, 191, 0.2); } 100% { transform: scale(1.02); box-shadow: 0 0 60px rgba(45, 212, 191, 0.4); border-color: rgba(45, 212, 191, 0.4); } }

        /* Typography & Content */
        h2 { font-size: 14px; font-weight: 800; color: var(--secondary); margin: 0 0 10px; letter-spacing: 4px; text-transform: uppercase; }
        h1 { font-size: 48px; font-weight: 800; margin: 0 0 20px; color: #fff; letter-spacing: -1.5px; line-height: 1.1; }
        .highlight { background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 16px; line-height: 1.8; color: var(--text-muted); margin: 0 0 40px; font-weight: 400; }
        
        /* Sleek Contact Button */
        .contact-wrapper { display: inline-flex; align-items: center; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(45, 212, 191, 0.2); border-radius: 50px; padding: 8px 25px 8px 8px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-decoration: none; position: relative; overflow: hidden; }
        .contact-wrapper::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transition: transform 0.5s; z-index: 1; }
        
        .contact-icon { width: 46px; height: 46px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; box-shadow: 0 0 20px rgba(45, 212, 191, 0.4); transition: transform 0.3s ease; z-index: 2; position: relative; }
        .contact-icon svg { width: 20px; height: 20px; fill: #fff; }
        
        .contact-text { display: flex; flex-direction: column; z-index: 2; position: relative; }
        .contact-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 2px; font-weight: 600; }
        .contact-email { font-size: 16px; font-weight: 600; color: #fff; transition: color 0.3s; }
        
        .contact-wrapper:hover { background: rgba(45, 212, 191, 0.08); border-color: rgba(45, 212, 191, 0.5); transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3), 0 0 25px rgba(45, 212, 191, 0.15); }
        .contact-wrapper:hover::before { transform: translateX(100%); }
        .contact-wrapper:hover .contact-icon { transform: scale(1.1) rotate(10deg); box-shadow: 0 0 25px rgba(45, 212, 191, 0.6); }
        .contact-wrapper:hover .contact-email { color: var(--primary); }

        .branding { margin-top: 50px; position: relative; z-index: 2; display: flex; align-items: center; gap: 8px; opacity: 0; animation: fadeIn 1s ease forwards 1s; }
        @keyframes fadeIn { to { opacity: 1; } }
        .branding-text { color: var(--text-muted); font-size: 14px; font-weight: 400; }
        .branding-logo { background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 16px; letter-spacing: 0.5px; }

        /* Responsive Design */
        @media (max-width: 850px) {
            .container { flex-direction: column; padding: 50px 40px; text-align: center; gap: 40px; }
            .content-section { text-align: center; display: flex; flex-direction: column; align-items: center; }
            .profile-wrapper { width: 320px; height: 320px; margin: 0 auto; }
            .profile-img { width: 220px; height: 220px; border-radius: 20px; }
            h1 { font-size: 38px; }
        }
    </style>
</head>
<body>
    <!-- Immersive Background -->
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    
    <!-- Floating Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <!-- Visual Section: Left side -->
        <div class="visual-section">
            <div class="profile-wrapper">
                <div class="profile-ring"></div>
                <div class="profile-ring-2"></div>
                <div class="profile-ring-3"></div>
                <img src="meoz-lab2.jpg?v=final" alt="Meoz Labs Logo" class="profile-img">
            </div>
        </div>

        <!-- Content Section: Right side -->
        <div class="content-section">
            <h2>Innovation Hub</h2>
            <h1>Welcome to <br><span class="highlight">Meoz Labs</span></h1>
            
            <p>We are a creative technology hub dedicated to crafting innovative digital solutions, exploring bold new ideas, and pushing the boundaries of web development and software engineering.</p>
            
            <a href="mailto:nguyendtan2030@gmail.com" class="contact-wrapper">
                <div class="contact-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 18H4V8L12 13L20 8V18ZM12 11L4 6H20L12 11Z"/>
                    </svg>
                </div>
                <div class="contact-text">
                    <span class="contact-label">Get in touch</span>
                    <span class="contact-email">nguyendtan2030@gmail.com</span>
                </div>
            </a>
        </div>
    </div>

    <div class="branding">
        <span class="branding-text">&copy; 2026</span>
        <span class="branding-logo">MeozLabs</span>
    </div>
</body>
</html>
